<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>HOME PARTY 10QUESTIONS SLOT</title>
<meta name="theme-color" content="#070814" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="10QUESTIONS" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<style>
:root{
  --bg:#070814;
  --ink:#fff;
  --muted:#aeb2d8;
  --accent:#ff4fa3;
  --accent2:#39d5ff;
  --yellow:#ffe45c;
  --green:#70f0b4;
  --red:#ff6b6b;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 10%,rgba(255,79,163,.18),transparent 30%),
    radial-gradient(circle at 88% 16%,rgba(57,213,255,.18),transparent 30%),
    radial-gradient(circle at 50% 105%,rgba(255,228,92,.12),transparent 38%),
    var(--bg);
  overflow-x:hidden;
}
.app{width:min(1180px,100%);margin:0 auto;padding:22px}
header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px}
.brand small{display:block;color:var(--muted);letter-spacing:.18em;font-weight:900;margin-bottom:5px}
h1{margin:0;font-size:clamp(28px,5.4vw,64px);letter-spacing:.02em;line-height:.9}
h1 span{color:var(--accent)}
.stage{display:grid;grid-template-columns:1fr 350px;gap:18px;align-items:stretch}
.mainPanel,.sidePanel{
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.03));
  border-radius:30px;
  box-shadow:0 24px 70px rgba(0,0,0,.42);
}
.mainPanel{padding:24px;min-height:650px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.screenLabel{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
.screenLabel b{color:#fff;letter-spacing:.12em;font-size:14px}
.lampRow{display:flex;gap:7px}
.lamp{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.18)}
.rolling .lamp:nth-child(1), .stopping .lamp:nth-child(1){background:var(--accent);box-shadow:0 0 18px var(--accent)}
.rolling .lamp:nth-child(2), .stopping .lamp:nth-child(2){background:var(--yellow);box-shadow:0 0 18px var(--yellow)}
.rolling .lamp:nth-child(3), .stopping .lamp:nth-child(3){background:var(--accent2);box-shadow:0 0 18px var(--accent2)}
.slotFrame{
  position:relative;
  border-radius:32px;
  background:linear-gradient(135deg,rgba(255,79,163,.95),rgba(57,213,255,.95));
  padding:7px;
  box-shadow:0 26px 70px rgba(0,0,0,.45);
}
.slotWindow{
  height:370px;
  border-radius:26px;
  background:#f8f8ff;
  color:#101225;
  overflow:hidden;
  position:relative;
  border:6px solid rgba(255,255,255,.75);
}
.slotWindow::before,.slotWindow::after{
  content:"";
  position:absolute;
  left:0;right:0;
  height:108px;
  z-index:4;
  pointer-events:none;
}
.slotWindow::before{top:0;background:linear-gradient(180deg,rgba(248,248,255,1),rgba(248,248,255,.72),transparent)}
.slotWindow::after{bottom:0;background:linear-gradient(0deg,rgba(248,248,255,1),rgba(248,248,255,.72),transparent)}
.targetLine{
  position:absolute;
  left:16px; right:16px;
  top:50%;
  transform:translateY(-50%);
  height:132px;
  border:5px solid rgba(255,79,163,.72);
  border-radius:22px;
  z-index:3;
  pointer-events:none;
  box-shadow:0 0 0 999px rgba(255,255,255,.04),0 0 30px rgba(255,79,163,.22);
}
.slotTrack{position:absolute;left:0;right:0;top:0;will-change:transform}
.qItem{
  height:132px;
  padding:16px 24px;
  display:grid;
  grid-template-columns:78px 1fr;
  align-items:center;
  gap:18px;
  border-bottom:1px solid rgba(20,22,40,.10);
  transition:filter .12s, transform .12s, background .12s, opacity .12s;
}
.qItem .badgeNo{
  width:70px;height:70px;
  border-radius:18px;
  display:grid;
  place-items:center;
  color:#101225;
  font-size:38px;
  font-weight:1000;
  box-shadow:0 10px 20px rgba(0,0,0,.18);
}
.qItem .text{
  font-size:clamp(24px,3.5vw,40px);
  line-height:1.18;
  font-weight:1000;
  letter-spacing:.01em;
}
.qItem.blinkPick{
  animation:pickBlink 1.06s ease-in-out both;
}
.qItem.blinkPick .badgeNo{
  animation:badgePulse 1.06s ease-in-out both;
}
@keyframes pickBlink{
  0%,100%{background:rgba(255,255,255,0);transform:scale(1);filter:none}
  12%,34%,56%{background:rgba(255,255,255,.96);transform:scale(1.012);filter:brightness(1.08)}
  22%,44%,66%{background:rgba(255,255,255,0);transform:scale(1);filter:none}
}
@keyframes badgePulse{
  12%,34%,56%{box-shadow:0 0 30px rgba(255,255,255,.92),0 10px 20px rgba(0,0,0,.18)}
}
.flash{position:absolute;inset:0;background:rgba(255,255,255,.75);opacity:0;pointer-events:none;z-index:8}
.flash.on{animation:flash .45s ease-out}
@keyframes flash{0%{opacity:0}35%{opacity:.85}100%{opacity:0}}
.decision{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}
.mainControls{
  width:min(640px,100%);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.utilityControls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  width:100%;
}
button{
  appearance:none;
  border:0;
  border-radius:999px;
  padding:14px 20px;
  font-weight:1000;
  letter-spacing:.04em;
  cursor:pointer;
  transition:.15s transform,.15s opacity;
  font-size:15px;
  box-shadow:0 10px 22px rgba(0,0,0,.25);
}
button:hover{transform:translateY(-1px)}
button:disabled{opacity:.45;cursor:not-allowed}
.primary,
.stopBtn{
  min-height:78px;
  border-radius:28px;
  font-size:clamp(26px,4vw,38px);
  padding:20px 22px;
  letter-spacing:.08em;
  box-shadow:0 14px 30px rgba(0,0,0,.32);
}
.primary{background:linear-gradient(135deg,var(--accent),#ff924d);color:#fff}
.stopBtn{background:linear-gradient(135deg,#ffe45c,#ff7a59);color:#111329}
.utilityControls .secondary,
.utilityControls .danger{
  font-size:12px;
  padding:9px 13px;
  box-shadow:0 6px 14px rgba(0,0,0,.22);
}
.secondary{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.16)}
.danger{background:rgba(255,107,107,.14);color:#fff;border:1px solid rgba(255,107,107,.35)}
.sidePanel{padding:18px;min-height:650px;display:flex;flex-direction:column}
.resultCard{
  background:rgba(255,255,255,.94);
  color:#101225;
  border-radius:26px;
  padding:18px;
  min-height:210px;
  box-shadow:inset 0 -8px 0 rgba(0,0,0,.08);
  margin-bottom:16px;
}
.resultHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.bigNumber{
  width:74px;height:74px;
  border-radius:18px;
  display:grid;
  place-items:center;
  font-size:42px;
  font-weight:1000;
  color:#101225;
  background:var(--yellow);
}
.resultHead small{color:#70738e;font-weight:900;letter-spacing:.14em}
.resultText{font-size:clamp(22px,2.5vw,32px);line-height:1.22;font-weight:1000}
.note{color:var(--muted);line-height:1.65;font-size:14px;margin:0 0 16px}
.progressText{color:#fff;font-weight:1000;text-align:right;margin:0 0 8px;letter-spacing:.08em}
.status{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.mini{
  aspect-ratio:1/1;
  border-radius:14px;
  display:grid;
  place-items:center;
  font-size:22px;
  font-weight:1000;
  color:#fff;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.14);
  position:relative;
}
.mini.done{background:rgba(112,240,180,.18);border-color:rgba(112,240,180,.55)}
.mini.done::after{content:"★";position:absolute;right:3px;top:-6px;color:var(--yellow);font-size:18px}
.sideActions{display:grid;gap:9px;margin-top:auto}
.check{display:flex;align-items:center;gap:9px;color:var(--muted);margin:14px 0 2px;font-weight:800}
input[type="checkbox"]{width:19px;height:19px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal.show{display:flex}
.modalBox{
  width:min(940px,100%);
  max-height:min(92vh,860px);
  overflow:auto;
  background:#12142a;
  border:1px solid rgba(255,255,255,.16);
  border-radius:28px;
  box-shadow:0 25px 90px rgba(0,0,0,.55);
  padding:20px;
}
.modalHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.modalHead h2{margin:0;font-size:24px}
.editHelp{color:var(--muted);line-height:1.6;margin:0 0 12px}
label{display:block;color:var(--muted);font-weight:900;letter-spacing:.08em;font-size:13px}
textarea{
  width:100%;
  min-height:420px;
  resize:vertical;
  margin-top:6px;
  border-radius:16px;
  padding:12px;
  color:#fff;
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.16);
  font:inherit;
  line-height:1.5;
}
.modalActions{display:flex;flex-wrap:wrap;gap:10px;margin-top:15px;justify-content:flex-end}
.confetti{pointer-events:none;position:fixed;inset:0;overflow:hidden;z-index:70}
.piece{position:absolute;width:10px;height:16px;opacity:0;animation:fall 1.7s ease-out forwards}
@keyframes fall{0%{transform:translateY(-40px) rotate(0deg);opacity:1}100%{transform:translateY(720px) rotate(520deg);opacity:0}}



/* PWA mode: app-like home screen launch */
body.pwa-mode .utilityControls #fsBtn{
  display:none;
}
body.pwa-mode{
  overscroll-behavior:none;
}

/* v20: iPad fullscreen top clipping fix */
@media (orientation: landscape){
  :fullscreen .app{
    padding-top:max(54px, calc(env(safe-area-inset-top) + 42px));
  }
  :-webkit-full-screen .app{
    padding-top:max(54px, calc(env(safe-area-inset-top) + 42px));
  }
}

/* iPad/Safari fullscreen overlay avoidance */
:fullscreen .app{
  padding-top:max(28px, env(safe-area-inset-top));
  padding-left:max(22px, calc(env(safe-area-inset-left) + 64px));
}
:-webkit-full-screen .app{
  padding-top:max(28px, env(safe-area-inset-top));
  padding-left:max(22px, calc(env(safe-area-inset-left) + 64px));
}
:fullscreen header{
  margin-bottom:14px;
}
:-webkit-full-screen header{
  margin-bottom:14px;
}
@media (orientation: landscape){
  :fullscreen .app{
    padding-left:max(22px, calc(env(safe-area-inset-left) + 76px));
  }
  :-webkit-full-screen .app{
    padding-left:max(22px, calc(env(safe-area-inset-left) + 76px));
  }
}

@media(max-width:900px){
  .stage{grid-template-columns:1fr}
  .mainPanel,.sidePanel{min-height:auto}
  .slotWindow{height:320px}
  .qItem{height:120px;grid-template-columns:72px 1fr;padding:12px 16px}
  .qItem .badgeNo{width:64px;height:58px;font-size:34px;border-radius:14px}
  .targetLine{height:120px}
  header{flex-direction:column;align-items:flex-start}
  textarea{min-height:320px}
  .mainControls{gap:10px}
  .primary,.stopBtn{min-height:68px;font-size:clamp(22px,7vw,32px);padding:17px 14px}
  .utilityControls .secondary,.utilityControls .danger{font-size:11px;padding:8px 11px}
}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="brand">
    <small>LMD JOURNAL / HOME PARTY</small>
    <h1><span>10QUESTIONS</span> SLOT</h1>
  </div>
</header>

<main class="stage">
<section class="mainPanel" id="mainPanel">
  <div class="screenLabel">
    <b>QUESTION SLOT</b>
    <div class="lampRow"><i class="lamp"></i><i class="lamp"></i><i class="lamp"></i></div>
  </div>

  <div class="slotFrame">
    <div class="slotWindow" id="slotWindow">
      <div class="targetLine"></div>
      <div class="slotTrack" id="slotTrack"></div>
      <div class="flash" id="flash"></div>
    </div>
  </div>

  <div class="decision">
    <div class="mainControls">
      <button class="primary" id="spinBtn">START</button>
      <button class="stopBtn" id="stopBtn" disabled>STOP</button>
    </div>
    <div class="utilityControls">
      <button class="secondary" id="editBtn">質問編集</button>
      <button class="secondary" id="soundBtn">音：ON</button>
      <button class="secondary" id="fsBtn">全画面</button>
      <button class="danger" id="resetBtn">リセット</button>
    </div>
  </div>
</section>

<aside class="sidePanel">
  <div class="resultCard">
    <div class="resultHead">
      <div>
        <small>SELECTED</small>
        <div style="font-weight:1000;font-size:18px;">PICKED QUESTION</div>
      </div>
      <div class="bigNumber" id="bigNumber">?</div>
    </div>
    <div class="resultText" id="resultText">STARTを押すと、質問が回り始めます。</div>
  </div>

  <div class="progressText" id="progressText">0 / 10</div>
  <div class="status" id="status"></div>
  <div class="sideActions">
    <label class="check"><input type="checkbox" id="noRepeat" checked> 一度出た質問は次から除外</label>
  </div>
</aside>
</main>
</div>

<div class="modal" id="modal">
  <div class="modalBox">
    <div class="modalHead">
      <h2>質問を編集</h2>
      <button class="secondary" id="closeBtn">閉じる</button>
    </div>
    <p class="editHelp">質問を1行に1つずつ入力してください。10個以上入れておくと、その中からランダムに最大10問を抽選します。</p>
    <label for="questionList">質問リスト</label>
    <textarea id="questionList"></textarea>
    <div class="modalActions">
      <button class="danger" id="defaultBtn">初期質問に戻す</button>
      <button class="primary" id="saveBtn">保存して閉じる</button>
    </div>
  </div>
</div>

let audioCtx=null;
let audioBuffers={};
let spinSource=null;
let audioReady=false;
let audioPreparing=false;
const fallbackAudio={
  spin:document.getElementById("fallbackSpin"),
  stop:document.getElementById("fallbackStop"),
  slowdown:document.getElementById("fallbackSlowdown"),
  flash:document.getElementById("fallbackFlash")
};

function loadQuestions(){
  try{
    const saved=JSON.parse(localStorage.getItem("hp10q_slot_v9_questions")||"[]");
    return Array.isArray(saved)&&saved.length?saved:defaultQuestions.slice();
  }catch(e){return defaultQuestions.slice()}
}
function saveQuestionList(){
  const lines=questionList.value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  questions=lines.length?lines:defaultQuestions.slice();
  localStorage.setItem("hp10q_slot_v9_questions",JSON.stringify(questions));
  resetAll("質問を保存しました。STARTを押して回してください。",false);
  modal.classList.remove("show");
}
function getItems(){
  return questions.map((q,i)=>({id:i,index:i,color:colors[i%colors.length],question:q,label:"Q"}));
}
function getActiveItems(){
  const items=getItems();
  return noRepeat.checked?items.filter(item=>!doneIds.has(item.id)):items;
}
function getItemH(){
  const first=document.querySelector(".qItem");
  return first?first.getBoundingClientRect().height:132;
}
function getCenterOffset(){
  return slotWindow.getBoundingClientRect().height/2-getItemH()/2;
}
function setTrackY(){
  slotTrack.style.transform=`translateY(${getCenterOffset()-offset}px)`;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[s]));
}
function itemHtml(item){
  return `<div class="qItem" data-id="${item.id}"><div class="badgeNo" style="background:${item.color}">${escapeHtml(item.label)}</div><div class="text">${escapeHtml(item.question)}</div></div>`;
}
function buildTrack(centerIndex=0){
  const items=getItems();
  renderedItems=[];
  let html="";
  const loops=80;
  for(let r=0;r<loops;r++){
    items.forEach(item=>{
      renderedItems.push(item);
      html+=itemHtml(item);
    });
  }
  slotTrack.innerHTML=html;
  const itemH=getItemH();
  const safeIndex=items.length?Math.min(centerIndex,items.length-1):0;
  const baseLoop=20;
  offset=(items.length*baseLoop+safeIndex)*itemH;
  currentIndex=safeIndex;
  setTrackY();
}
function keepOffsetInSafeZone(){
  const items=getItems();
  if(!items.length)return;
  const itemH=getItemH();
  const cycle=items.length*itemH;
  const max=items.length*58*itemH;
  if(offset>max) offset-=cycle*30;
}
function chooseTarget(){
  if(drawCount>=maxDraws)return null;
  const active=getActiveItems();
  if(active.length===0)return null;
  return active[Math.floor(Math.random()*active.length)];
}
function easeOutQuad(t){return 1-Math.pow(1-t,2)}
function b64ToArrayBuffer(b64){
  const binary=atob(b64);
  const len=binary.length;
  const bytes=new Uint8Array(len);
  for(let i=0;i<len;i++)bytes[i]=binary.charCodeAt(i);
  return bytes.buffer;
}
function getOrCreateAudioCtx(){
  if(!audioCtx){
    const AC=window.AudioContext||window.webkitAudioContext;
    if(AC)audioCtx=new AC();
  }
  return audioCtx;
}
async function prepareAudio(){
  if(!soundEnabled)return false;
  if(audioReady)return true;
  if(audioPreparing){
    const started=performance.now();
    while(audioPreparing && !audioReady && performance.now()-started<1800){
      await new Promise(r=>setTimeout(r,30));
    }
    return audioReady;
  }
  audioPreparing=true;
  try{
    const ctx=getOrCreateAudioCtx();
    if(!ctx)return false;
    await ctx.resume();
    const entries=Object.entries(AUDIO_DATA);
    for(const [key,val] of entries){
      if(!audioBuffers[key]){
        const arrayBuffer=b64ToArrayBuffer(val);
        audioBuffers[key]=await ctx.decodeAudioData(arrayBuffer);
      }
    }
    audioReady=true;
    return true;
  }catch(e){
    console.warn("Audio prepare failed:",e);
    return false;
  }finally{
    audioPreparing=false;
  }
}
function getAudioMsByKey(key,fallback){
  const buffer=audioBuffers[key];
  if(buffer)return buffer.duration*1000;
  const a=fallbackAudio[key];
  if(a && Number.isFinite(a.duration) && a.duration>0)return a.duration*1000;
  return fallback;
}
function playBuffer(key,{loop=false,volume=1}={}){
  if(!soundEnabled)return null;
  const ctx=getOrCreateAudioCtx();
  const buffer=audioBuffers[key];
  if(!ctx||!buffer)return null;
  try{
    const source=ctx.createBufferSource();
    const gain=ctx.createGain();
    source.buffer=buffer;
    source.loop=loop;
    gain.gain.value=volume;
    source.connect(gain);
    gain.connect(ctx.destination);
    source.start(0);
    return source;
  }catch(e){
    console.warn("Audio play failed:",e);
    return null;
  }
}
function playFallback(key,{loop=false}={}){
  if(!soundEnabled)return null;
  const a=fallbackAudio[key];
  if(!a)return null;
  try{
    a.pause();
    a.currentTime=0;
    a.loop=loop;
    a.muted=false;
    a.volume=1;
    const p=a.play();
    if(p&&p.catch)p.catch(err=>console.warn("Fallback audio failed:",err));
    return a;
  }catch(e){
    console.warn("Fallback audio error:",e);
    return null;
  }
}
function stopFallback(key){
  const a=fallbackAudio[key];
  if(!a)return;
  try{
    a.pause();
    a.currentTime=0;
  }catch(e){}
}
function playSound(key,{loop=false}={}){
  if(!soundEnabled)return null;
  // WebAudioが準備済みなら低遅延再生。未準備ならHTML audioで即鳴らす。
  if(audioReady){
    return playBuffer(key,{loop});
  }
  return playFallback(key,{loop});
}
function stopSpinSound(){
  try{spinSource?.stop(0)}catch(e){}
  spinSource=null;
  stopFallback("spin");
}
function stopAllAudio(){
  stopSpinSound();
  ["stop","slowdown","flash"].forEach(stopFallback);
}
function updateSoundButton(){
  soundBtn.textContent=soundEnabled?"音：ON":"音：OFF";
}
function startRolling(){
  if(rolling||stopping)return;
  const target=chooseTarget();
  if(!target){
    resultText.textContent=drawCount>=maxDraws?"10問終了しました。リセットするともう一度使えます。":"抽選できる質問がありません。質問を追加するかリセットしてください。";
    return;
  }

  // PWA / iPad対策：
  // 音声準備を待ってから動かすと、Safari側の音声デコード待ちで
  // STARTボタンがLOADINGのまま止まることがある。
  // なので、画面の回転は即開始し、音は準備でき次第鳴らす。
  rolling=true;
  stopping=false;
  mainPanel.classList.add("rolling");
  spinBtn.disabled=true;
  stopBtn.disabled=false;
  editBtn.disabled=true;
  resetBtn.disabled=true;
  spinBtn.textContent="ROLLING...";
  resultText.textContent="STOPを押すと質問が確定します。";

  stopSpinSound();

  // START直後に必ず何か鳴るよう、まずHTML audioで即再生。
  // その裏でWebAudioを準備する。準備済みならWebAudioを使う。
  if(audioReady){
    spinSource=playBuffer("spin",{loop:true});
  }else{
    playFallback("spin",{loop:true});
    prepareAudio();
  }

  lastTime=performance.now();
  rafId=requestAnimationFrame(rollLoop);
}
function rollLoop(now){
  if(!rolling)return;
  const dt=Math.min(40,now-lastTime);
  lastTime=now;
  offset+=speed*dt;
  keepOffsetInSafeZone();
  setTrackY();
  rafId=requestAnimationFrame(rollLoop);
}
function stopRolling(){
  if(!rolling||stopping)return;

  const active=getActiveItems();
  if(active.length===0)return;

  stopping=true;
  rolling=false;
  cancelAnimationFrame(rafId);
  rafId=null;
  mainPanel.classList.remove("rolling");
  mainPanel.classList.add("stopping");
  stopBtn.disabled=true;
  spinBtn.textContent="STOPPING...";
  stopSpinSound();
  playSound("stop");
  playSound("slowdown");

  const items=getItems();
  const itemH=getItemH();
  const currentAbsIndex=Math.floor(offset/itemH);
  const startOffset=offset;
  const duration=getAudioMsByKey("slowdown",2881);

  // 重要：
  // 先に「自然に減速して止まる距離」を決める。
  // easeOutQuad は初速 = 2 * 距離 / 時間。
  // だから 距離 = speed * 時間 / 2 にすると、STOP直後の初速がSTART中の速度と一致する。
  const desiredDistance = speed * duration / 2;
  const idealAbsIndex = Math.max(currentAbsIndex + 1, Math.round((startOffset + desiredDistance) / itemH));

  // その自然停止位置に一番近い「未出題の質問」を当たりにする。
  // これで、質問へ無理やり飛ばず、STOP後に加速して見えない。
  const activeIds=new Set(active.map(item=>item.id));
  let bestAbsIndex=null;
  let bestItem=null;
  let bestScore=Infinity;

  for(let delta=-items.length*2; delta<=items.length*3; delta++){
    const candidate=idealAbsIndex+delta;
    if(candidate<=currentAbsIndex)continue;
    const item=items[((candidate%items.length)+items.length)%items.length];
    if(noRepeat.checked && !activeIds.has(item.id))continue;
    const candidateOffset=candidate*itemH;
    const score=Math.abs(candidateOffset-(startOffset+desiredDistance));
    if(score<bestScore){
      bestScore=score;
      bestAbsIndex=candidate;
      bestItem=item;
    }
  }

  if(!bestItem){
    bestItem=active[Math.floor(Math.random()*active.length)];
    const targetLocalIndex=items.findIndex(item=>item.id===bestItem.id);
    const base=currentAbsIndex+items.length;
    bestAbsIndex=base+((targetLocalIndex-(base%items.length)+items.length)%items.length);
  }

  currentStopTarget=bestItem;
  currentStopAbsIndex=bestAbsIndex;
  const targetLocalIndex=items.findIndex(item=>item.id===bestItem.id);
  const endOffset=currentStopAbsIndex*itemH;
  const startTime=performance.now();

  function decel(now){
    const t=Math.min(1,(now-startTime)/duration);
    const eased=easeOutQuad(t);
    offset=startOffset+(endOffset-startOffset)*eased;
    setTrackY();
    if(t<1){
      requestAnimationFrame(decel);
    }else{
      offset=endOffset;
      currentIndex=targetLocalIndex;
      setTrackY();
      confirmPick(bestItem,currentStopAbsIndex);
    }
  }
  requestAnimationFrame(decel);
}
function confirmPick(item,absIndex){
  mainPanel.classList.remove("stopping");
  stopping=false;

  drawCount=Math.min(maxDraws,drawCount+1);
  if(noRepeat.checked)doneIds.add(item.id);
  localStorage.setItem("hp10q_slot_v9_done",JSON.stringify([...doneIds]));
  localStorage.setItem("hp10q_slot_v9_drawCount",String(drawCount));

  bigNumber.textContent=String(drawCount);
  bigNumber.style.background=item.color;
  resultText.textContent=item.question;
  buildStatus();

  document.querySelectorAll(".qItem.blinkPick").forEach(el=>el.classList.remove("blinkPick"));
  const qItems=document.querySelectorAll(".qItem");
  const targetEl=qItems[absIndex];
  if(targetEl){
    void targetEl.offsetWidth;
    targetEl.classList.add("blinkPick");
  }

  flash.classList.remove("on");
  void flash.offsetWidth;
  flash.classList.add("on");
  playSound("flash");
  burst();

  setTimeout(()=>{
    spinBtn.disabled=false;
    editBtn.disabled=false;
    resetBtn.disabled=false;
    stopBtn.disabled=true;
    spinBtn.textContent="START";
  },1100);
}
function buildStatus(){
  statusEl.innerHTML="";
  for(let i=1;i<=maxDraws;i++){
    const div=document.createElement("div");
    div.className="mini"+(i<=drawCount?" done":"");
    div.textContent=i;
    statusEl.appendChild(div);
  }
  progressText.textContent=`${drawCount} / ${maxDraws}`;
}
function resetAll(message="リセットしました。STARTを押すと、質問が回り始めます。",keepResult=false){
  stopAllAudio();
  rolling=false;
  stopping=false;
  if(rafId)cancelAnimationFrame(rafId);
  rafId=null;
  mainPanel.classList.remove("rolling","stopping");
  doneIds=new Set();
  drawCount=0;
  localStorage.setItem("hp10q_slot_v9_done","[]");
  localStorage.setItem("hp10q_slot_v9_drawCount","0");
  if(!keepResult){
    resultText.textContent=message;
    bigNumber.textContent="?";
    bigNumber.style.background="var(--yellow)";
  }
  spinBtn.disabled=false;
  stopBtn.disabled=true;
  editBtn.disabled=false;
  resetBtn.disabled=false;
  spinBtn.textContent="START";
  buildStatus();
  buildTrack(0);
}
function restoreDefaults(){
  questions=defaultQuestions.slice();
  localStorage.setItem("hp10q_slot_v9_questions",JSON.stringify(questions));
  questionList.value=questions.join("\n");
  resetAll("初期質問に戻しました。",false);
}
function burst(){
  const box=document.getElementById("confetti");
  const palette=["#ff4fa3","#39d5ff","#ffe45c","#70f0b4","#ff914d","#9b7bff"];
  for(let i=0;i<48;i++){
    const p=document.createElement("div");
    p.className="piece";
    p.style.left=Math.random()*100+"%";
    p.style.top="-30px";
    p.style.background=palette[Math.floor(Math.random()*palette.length)];
    p.style.animationDelay=Math.random()*0.18+"s";
    p.style.transform=`rotate(${Math.random()*180}deg)`;
    box.appendChild(p);
    setTimeout(()=>p.remove(),2000);
  }
}

spinBtn.addEventListener("click",startRolling);
stopBtn.addEventListener("click",stopRolling);
editBtn.addEventListener("click",()=>{questionList.value=questions.join("\n");modal.classList.add("show")});
closeBtn.addEventListener("click",()=>modal.classList.remove("show"));
saveBtn.addEventListener("click",saveQuestionList);
defaultBtn.addEventListener("click",restoreDefaults);
resetBtn.addEventListener("click",()=>resetAll());
noRepeat.addEventListener("change",()=>resetAll("設定を変更しました。STARTを押して回してください。",false));
soundBtn.addEventListener("click",()=>{
  soundEnabled=!soundEnabled;
  localStorage.setItem("hp10q_slot_v9_sound",JSON.stringify(soundEnabled));
  updateSoundButton();
  if(soundEnabled){
    playFallback("stop");
    prepareAudio();
  }
  if(!soundEnabled)stopAllAudio();
});
fsBtn.addEventListener("click",()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
});
window.addEventListener("resize",()=>buildTrack(currentIndex));

["pointerdown","touchstart","click"].forEach(ev=>{
  window.addEventListener(ev,()=>{
    if(soundEnabled){
      Object.values(fallbackAudio).forEach(a=>{try{a.load()}catch(e){}});
      prepareAudio();
    }
  },{once:true,passive:true});
});


if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  document.body.classList.add('pwa-mode');
}

updateSoundButton();
buildStatus();
buildTrack(0);
</script>
</body>
</html>
